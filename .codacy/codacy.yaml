exclude_paths:
  - node_modules/**
  - "**/*.min.js"
  - "**/dist/**"
  - out/**

tools:
  - name: pmd
    version: 7.0.0
    config:
      # Use the existing ruleset file under tools-configs
      rulesets:
        - tools-configs/ruleset.xml

  - name: eslint
    version: 9.38.0
    config:
      # Point Codacy to the repository's ESLint flat config
      file: eslint.config.js
